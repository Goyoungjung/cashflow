<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>우리집 가계부 · 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#F2F4F6;display:flex;align-items:center;justify-content:center;min-height:100vh;}
.card{background:#fff;border-radius:24px;padding:40px;width:100%;max-width:400px;box-shadow:0 10px 30px rgba(23,33,55,.08);}
.logo{width:44px;height:44px;border-radius:14px;background:#20242C;color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
h1{text-align:center;font-size:22px;font-weight:800;color:#191F28;margin-bottom:4px;}
p{text-align:center;font-size:13px;color:#A0A8B3;margin-bottom:28px;}
label{display:block;font-size:13px;font-weight:700;color:#5C6573;margin-bottom:6px;}
input{width:100%;padding:13px 16px;border:1px solid #EEF1F4;border-radius:12px;font-size:14px;font-family:inherit;outline:none;margin-bottom:14px;transition:border .2s;}
input:focus{border-color:#20242C;}
.btn{width:100%;height:50px;border-radius:14px;background:#20242C;color:#fff;font-size:15px;font-weight:800;cursor:pointer;border:none;font-family:inherit;margin-top:4px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.err{color:#EF4444;font-size:12.5px;font-weight:600;margin-top:12px;text-align:center;}
.toggle{text-align:center;margin-top:18px;font-size:13px;color:#5C6573;}
.toggle a{color:#3182F6;font-weight:700;cursor:pointer;text-decoration:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h11.5a1.5 1.5 0 0 1 1.5 1.5v1M3 7v9a2 2 0 0 0 2 2h14a1 1 0 0 0 1-1v-3M21 11h-4a1.5 1.5 0 0 0 0 4h4"/></svg>
  </div>
  <h1>우리집 가계부</h1>
  <p id="subtitle">계정에 로그인하세요</p>

  <form id="form">
    <label>이메일</label>
    <input id="email" type="email" placeholder="you@example.com" required>
    <label>비밀번호</label>
    <input id="password" type="password" placeholder="••••••••" required>
    <button class="btn" type="submit" id="submit-btn">로그인</button>
  </form>
  <div class="err" id="err-msg"></div>
  <div class="toggle">
    <span id="toggle-text">계정이 없으신가요?</span>
    <a id="toggle-link">회원가입</a>
  </div>
</div>

<script src="./env.js"></script>
<script type="module">
import { signIn, signUp, getSession } from './js/api/auth.js';

getSession().then((s) => { if (s) location.href = '/'; });

let isSignUp = false;
const subtitle = document.getElementById('subtitle');
const toggleText = document.getElementById('toggle-text');
const toggleLink = document.getElementById('toggle-link');
const submitBtn = document.getElementById('submit-btn');
const errMsg = document.getElementById('err-msg');

toggleLink.addEventListener('click', () => {
  isSignUp = !isSignUp;
  subtitle.textContent = isSignUp ? '새 계정을 만드세요' : '계정에 로그인하세요';
  submitBtn.textContent = isSignUp ? '회원가입' : '로그인';
  toggleText.textContent = isSignUp ? '이미 계정이 있으신가요?' : '계정이 없으신가요?';
  toggleLink.textContent = isSignUp ? '로그인' : '회원가입';
  errMsg.textContent = '';
});

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  submitBtn.disabled = true;
  errMsg.textContent = '';
  try {
    if (isSignUp) await signUp(email, password);
    else await signIn(email, password);
    location.href = '/';
  } catch (err) {
    errMsg.textContent = err.message;
  } finally {
    submitBtn.disabled = false;
  }
});
</script>
</body>
</html>
